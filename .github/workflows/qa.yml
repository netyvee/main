name: QA Gate

# MAIN-01 Phase A — corporate main site.
#
# Build smoke + corporate content gate on every push/PR. The content gate stays
# CRM-side (PageHealth + the forbidden-claims gate in netyvee/app); this gate proves
# the site builds on its pinned framework and that no division phone can appear in
# the corporate output.
#
# This file used to say: "a green tick here does NOT mean the deployed site is good."
# That was true, and it was not enough. On 2026-07-20 all six Vercel deployments of
# this repository failed while the migration was reported as a successful deploy with
# verified rendering. A caveat in a comment does not stop a false success; only a
# failing check does. So the deploy is now verified by this workflow — see the
# `deploy` job below, which fails when Vercel fails.
#
# Two things had to change for that green tick to mean anything:
#
#  1. INSTALL EXACTLY AS THE DEPLOY PLATFORM DOES. This job ran `npm install`, which
#     is permitted to repair a lockfile. Vercel runs `npm ci`, which is not. The
#     lockfile recorded one platform binary (`@next/swc-win32-x64-msvc`) instead of
#     nine, so Vercel had no Linux SWC binary and `next build` died — while this
#     workflow would have gone green, because npm quietly fixed the tree for it.
#     `npm ci` here, always. Plus an explicit lockfile-platform check, so the cause
#     is named rather than left as a confusing build error.
#
#  2. VERIFY THE DEPLOY, DON'T ASSUME IT. Nothing polled the deployment. The audit
#     even asserted "No Vercel project. Nothing is deployed." — contradicted by one
#     unrun API call. Absence of evidence was read as evidence of absence.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Manual trigger. Added after this repo's first three runs all returned
  # `startup_failure` during a GitHub service incident (githubstatus.com reported a
  # Minor Service Outage; the Actions API returned 503/504 for ~1.5 hours). The
  # workflow itself was registered and active throughout, so the failures were the
  # incident rather than the file — but with no way to re-trigger without pushing a
  # commit, "is CI actually green?" could not be answered at all. It can now.
  workflow_dispatch:

# Actions economy (CI-ECON-01 / B-CI-02): collapse superseded runs. The CRM
# auto-publish burst pushes several [crm-auto] commits to main in quick succession;
# they all share refs/heads/main and collapse to one effective run.
#
# This used to add "safe because this workflow has no deploy job" — no longer true, so
# stating the current reason instead of leaving a stale one: the `deploy` job VERIFIES a
# deployment, it does not perform one. Vercel builds independently of this workflow, so
# cancelling a superseded run never interrupts a deployment. The cost is that the
# superseded commit's verification is abandoned — acceptable, because the newer commit
# on the same branch gets verified moments later and that is the state that matters.
concurrency:
  group: qa-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa:
    name: build + corporate content gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install (npm ci — exactly what Vercel runs, never npm install)
        # `npm install` may rewrite the lockfile to suit this runner. That makes CI
        # test a dependency tree the deploy never receives, which is how a green CI
        # run coexisted with six failed deployments.
        run: npm ci
      - name: Lockfile must install on the deploy platform (linux-x64)
        # Runs after install because the checker ships in the framework, and before
        # build because that is where the damage shows. Note npm ci does NOT fail on
        # a missing optional platform binary — it installs happily and `next build`
        # then dies with an opaque SWC error. This names the real cause instead, and
        # it is the check that would have caught the MAIN-01 deploy failure.
        # `npm ci` never rewrites package-lock.json, so this reads what was committed.
        run: node node_modules/@vigil/web-framework/scripts/lockfile-platform-check.mjs
      - name: Corporate content gate (content/pages/*.json)
        run: node scripts/content-check.mjs
      - name: Build
        run: npm run build
      - name: Assert the pilot page actually rendered
        # THE POINT OF THE WHOLE PILOT. A successful build is not evidence that the
        # published content reached the page — the CRM already reports "published" on
        # nothing more than an accepted GitHub commit (PUB-01 / D-092). So grep the
        # prerendered HTML for the marker string carried in the page JSON. If the
        # content did not render, this fails, even though everything upstream is green.
        run: |
          set -euo pipefail
          FILE=".next/server/app/pilot-render-check.html"
          if [ ! -f "$FILE" ]; then
            echo "✖ $FILE was not prerendered. Published content did not reach a page."
            find .next/server/app -name '*.html' -print || true
            exit 1
          fi
          if ! grep -q 'RENDER-PILOT-MARKER MAIN-01 PHASE-A' "$FILE"; then
            echo "✖ Marker absent from $FILE — the page built but the approved content did not render."
            exit 1
          fi
          if ! grep -q '11756806' "$FILE"; then
            echo "✖ Company registration absent — the corporate identity block did not render."
            exit 1
          fi
          echo "✓ Pilot page rendered with the approved content and corporate identity."
        # NOTE what this step does and does not prove. It proves the content renders in
        # a build produced HERE. It says nothing about the deployed site — which is why
        # it passed while every Vercel deployment failed. The `deploy` job below is the
        # part that was missing.

  deploy:
    name: deploy actually succeeded
    # DELIBERATELY NOT `needs: qa`. Vercel deploys independently of this workflow —
    # staffing's QA gate has been RED since 2026-07-19 and Vercel kept deploying — so
    # gating verification behind a green QA would skip it on exactly the deploys most
    # likely to be broken. "Did the code pass our checks" and "did the deploy succeed"
    # are two separate facts; coupling them hides the second whenever the first fails.
    # (Observed rather than reasoned: the first estate-wide rollout skipped this job on
    # staffing because its unrelated content gate was red.)
    #
    # Only on push: a pull_request build has no production deployment to verify, and
    # asserting one exists would fail every PR for the wrong reason.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Poll the Vercel deployment to a terminal state
        # This job exists because "the deploy succeeded" was reported to the founder
        # while all six deployments of this repository had failed. The evidence used
        # was a push, an accepted commit, and a build that passed on a laptop.
        #
        # deploy-verify.mjs treats absence of a deployment as FAILURE, refuses to
        # accept a non-terminal state as success, and fails on timeout rather than
        # assuming. It needs only GITHUB_TOKEN — Vercel's outcome is reported to the
        # GitHub deployments API, so no Vercel credential is involved and this is NOT
        # blocked on the MAIN-G2 founder gate, contrary to what the audit recorded.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          curl -sSfL -o /tmp/deploy-verify.mjs \
            https://raw.githubusercontent.com/netyvee/web-framework/v0.5.1/scripts/deploy-verify.mjs
          node /tmp/deploy-verify.mjs \
            --repo "${{ github.repository }}" \
            --sha "${{ github.sha }}" \
            --timeout 900
        # RENDER-AGAINST-THE-DEPLOYED-SITE is deliberately not asserted here yet. The
        # preview URLs are behind Vercel SSO (they answer 200 with a login page, which
        # a naive grep would pass), and there is no public production URL for this site
        # until cutover. deploy-verify.mjs rejects an SSO page rather than grepping it,
        # so this is recorded as a known limit, not quietly skipped. Add --url/--marker
        # at cutover, when a public URL exists.
